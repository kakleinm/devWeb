<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset=utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calcular IMC</title>
    <script type="module" src="imc.js" defer></script>
</head>
<body>
    <head>
        <hr>
        <a href="../">Home</a>
        <hr>
        <h2>Cálculo do IMC</h2>
        <hr>
    </head>
    <main>
        <span id="erro" style="color: red;"></span>
        <form id="formMedia" action="processaDados.php" method="POST">
            <label for="nome">Nome: </label>
            <input id="nome" type="text"/>
            <label for="peso">Peso (kg): </label>
            <input type="number" step="0.01" id="peso" />
            <label for="altura">Altura (m): </label>
            <input type="number" step="0.01" id="altura" />

            <input id="btnEnviar" type="button" value="calcular">
        </form>
        <h3 id="dados" class="info"></h3>
        <hr>
        <span id="pessoaNome" class="info"></span> <br/>
        <span id="pessoaImc" class="info"></span> <br/>
        <span id="pessoaClassificacao" class="info"></span> 
    </main>
    <footer></footer>
</body>
</html>
