<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cálculo de IMC</title>
    <script src="aa.js" defer></script>
</head>
<body>
    <head>
        <h1>Cálculo do IMC</h1>
        <hr>
    </head>
    <main>
        <span id="erro" style="color: red;"></span>
        <form action="">
            <label for="nome">Nome: </label>
            <input type="text" name="nome" id="nome" required>
            <label for="peso">Peso (kg): </label>
            <input type="number" name="peso" id="peso" step="0.01">
            <label for="altura">Altura (m): </label>
            <input type="number" name="altura" id="altura" step="0.01">
            <input type="button" value="Enviar" id="botao">
        </form>
        <hr>
        <h3 class="info" id="dados"></h3>
        <span class="info" id="nomePessoa"></span><br>
        <span class="info" id="imc"></span><br>
        <span class="info" id="classificacao"></span>
    </main>
</body>
</html>
